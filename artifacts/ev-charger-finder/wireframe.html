<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wireframe: ev-charger-finder</title>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<script src="https://unpkg.com/lucide@0.576.0"></script>
<style>
  :root {
    --w-bg: #f5f5f5;
    --w-border: #ccc;
    --w-text: #555;
    --w-muted: #aaa;
    --w-fill: #eee;
  }

  * {
    font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
    color: var(--w-text);
  }

  body { background: var(--w-bg); }

  /* Screen nav */
  nav { position: sticky; top: 0; z-index: 40; background: var(--w-bg); border-bottom: 1px solid var(--w-border); }
  nav button { cursor: pointer; font-size: 13px; }
  nav button:hover { background: var(--w-fill); border-radius: 4px; }
  nav button.active { font-weight: bold; border-bottom: 2px solid var(--w-text); }

  .screen { display: none; }
  .screen.active { display: block; }

  /* 화면 간 전환 배선: data-goto 속성을 단 요소는 클릭 시 해당 화면으로 이동 */
  [data-goto] { cursor: pointer; }
  [data-goto]::after { content: " ↗"; color: var(--w-muted); }
  [data-goto]:hover { outline: 2px solid var(--w-text); outline-offset: 2px; }

  /* 화면 밖 진입 조건 한 줄 (템플릿 크롬) */
  .screen-entry { font-size: 12px; color: var(--w-muted); margin: -12px 0 16px; }

  /* Viewport toggle */
  .vp-toggle button {
    font-size: 12px; padding: 2px 8px;
    border: 1px solid var(--w-border); cursor: pointer; background: white;
  }
  .vp-toggle button:first-child { border-radius: 4px 0 0 4px; }
  .vp-toggle button:last-child { border-radius: 0 4px 4px 0; border-left: none; }
  .vp-toggle button.active { background: var(--w-text); color: white; }

  /* Mobile viewport frame */
  body.viewport-mobile .screen-content {
    max-width: 375px;
    margin: 24px auto;
    border: 2px solid var(--w-border);
    min-height: 667px;
    background: white;
  }

  /* w-prefixed custom classes */
  .w-mapgrid {
    background-image:
      linear-gradient(var(--w-border) 1px, transparent 1px),
      linear-gradient(90deg, var(--w-border) 1px, transparent 1px);
    background-size: 32px 32px;
    background-color: var(--w-fill);
    opacity: 1;
  }
  .w-mapgrid > * { position: absolute; }
  .w-pin-label { font-size: 10px; white-space: nowrap; }
</style>
</head>
<body class="p-0 m-0 viewport-mobile">

<nav class="flex items-center gap-4 px-6 py-2">
  <span class="text-xs" style="color:var(--w-muted)">wireframe</span>
  <button id="nav-initial" onclick="show('initial')" class="px-2 py-1">초기 화면</button>
  <button id="nav-results" onclick="show('results')" class="px-2 py-1">검색 결과</button>
  <button id="nav-not-found" onclick="show('not-found')" class="px-2 py-1">주소 못 찾음</button>
  <button id="nav-empty-radius" onclick="show('empty-radius')" class="px-2 py-1">반경 내 결과 없음</button>
  <div class="vp-toggle flex ml-auto">
    <button id="vp-desktop" onclick="setViewport('desktop')">Desktop</button>
    <button id="vp-mobile" onclick="setViewport('mobile')" class="active">Mobile</button>
  </div>
</nav>

<div id="screen-initial" class="screen active">
  <div class="screen-content @container max-w-6xl mx-auto p-6">

    <h2 class="text-lg font-bold mb-5" style="color:var(--w-muted); border-bottom:1px solid var(--w-border); padding-bottom:8px;">
      초기 화면
    </h2>

    <div class="flex flex-col gap-2 @md:flex-row @md:items-center">
      <input type="text" placeholder="주소나 지역명을 입력하세요" class="w-full @md:flex-1 border rounded px-3 py-2 text-sm" style="border-color:var(--w-border); background:white;">
      <button data-goto="screen-results" class="flex items-center justify-center gap-1 border rounded px-4 py-2 text-sm shrink-0" style="border-color:var(--w-border); background:var(--w-fill);">
        <i data-lucide="search" class="w-4 h-4"></i> 검색
      </button>
    </div>

    <div class="w-mapgrid relative w-full mt-4 rounded" style="height:420px; border:1px solid var(--w-border);">
      <div class="flex flex-col items-center" style="top:46%; left:46%;">
        <i data-lucide="map-pin" class="w-6 h-6"></i>
        <span class="w-pin-label mt-0.5">서울시청 (기본 위치)</span>
      </div>
    </div>

  </div>
</div>

<div id="screen-results" class="screen" data-scenario="S1 S3 S5">
  <div class="screen-content @container max-w-6xl mx-auto p-6">

    <h2 class="text-lg font-bold mb-5" style="color:var(--w-muted); border-bottom:1px solid var(--w-border); padding-bottom:8px;">
      검색 결과
    </h2>

    <div class="flex flex-col gap-2 @md:flex-row @md:items-center">
      <input type="text" value="서울시 강남구 테헤란로" class="w-full @md:flex-1 border rounded px-3 py-2 text-sm" style="border-color:var(--w-border); background:white;">
      <button class="flex items-center justify-center gap-1 border rounded px-4 py-2 text-sm shrink-0" style="border-color:var(--w-border); background:var(--w-fill);">
        <i data-lucide="search" class="w-4 h-4"></i> 검색
      </button>
    </div>

    <div class="w-mapgrid relative w-full mt-4 rounded" style="height:420px; border:1px solid var(--w-border);">

      <div class="flex flex-col items-center" style="top:34%; left:39%;">
        <i data-lucide="map-pin" class="w-6 h-6"></i>
        <span class="w-pin-label mt-0.5">테헤란로 충전소</span>
      </div>

      <div class="flex flex-col items-center" style="top:55%; left:60%;">
        <i data-lucide="map-pin" class="w-6 h-6"></i>
        <span class="w-pin-label mt-0.5">역삼동 충전소</span>
      </div>

      <div class="flex flex-col items-center" style="top:66%; left:28%;">
        <i data-lucide="map-pin" class="w-6 h-6"></i>
        <span class="w-pin-label mt-0.5">선릉로 충전소</span>
      </div>

      <div class="w-48 border rounded p-2 text-xs" style="top:12%; left:42%; background:white; border-color:var(--w-border);">
        <div class="flex items-start justify-between gap-2">
          <span class="font-bold">테헤란로 충전소</span>
          <i data-lucide="x" class="w-3 h-3 shrink-0"></i>
        </div>
        <div class="mt-1" style="color:var(--w-muted);">서울 강남구 테헤란로 133</div>
      </div>

    </div>

    <button data-goto="screen-initial" class="mt-4 text-xs border rounded px-3 py-1.5" style="border-color:var(--w-border); background:var(--w-fill);">
      다른 주소로 검색
    </button>

  </div>
</div>

<div id="screen-not-found" class="screen" data-scenario="S2">
  <div class="screen-content @container max-w-6xl mx-auto p-6">

    <h2 class="text-lg font-bold mb-5" style="color:var(--w-muted); border-bottom:1px solid var(--w-border); padding-bottom:8px;">
      주소 못 찾음
    </h2>

    <div class="flex flex-col gap-2 @md:flex-row @md:items-center">
      <input type="text" value="asdkfjqwer1234" class="w-full @md:flex-1 border rounded px-3 py-2 text-sm" style="border-color:var(--w-border); background:white;">
      <button class="flex items-center justify-center gap-1 border rounded px-4 py-2 text-sm shrink-0" style="border-color:var(--w-border); background:var(--w-fill);">
        <i data-lucide="search" class="w-4 h-4"></i> 검색
      </button>
    </div>

    <div class="flex items-center gap-2 mt-2 border rounded px-3 py-2 text-xs" style="border-color:var(--w-border); background:var(--w-fill);">
      <i data-lucide="alert-circle" class="w-4 h-4 shrink-0"></i>
      주소를 찾을 수 없습니다
    </div>

    <div class="w-mapgrid relative w-full mt-4 rounded" style="height:420px; border:1px solid var(--w-border);">
      <div class="flex flex-col items-center" style="top:46%; left:46%;">
        <i data-lucide="map-pin" class="w-6 h-6"></i>
        <span class="w-pin-label mt-0.5">서울시청 (기본 위치)</span>
      </div>
    </div>

  </div>
</div>

<div id="screen-empty-radius" class="screen" data-scenario="S4">
  <div class="screen-content @container max-w-6xl mx-auto p-6">

    <h2 class="text-lg font-bold mb-5" style="color:var(--w-muted); border-bottom:1px solid var(--w-border); padding-bottom:8px;">
      반경 내 결과 없음
    </h2>

    <div class="flex flex-col gap-2 @md:flex-row @md:items-center">
      <input type="text" value="강원도 인제군 진동리" class="w-full @md:flex-1 border rounded px-3 py-2 text-sm" style="border-color:var(--w-border); background:white;">
      <button class="flex items-center justify-center gap-1 border rounded px-4 py-2 text-sm shrink-0" style="border-color:var(--w-border); background:var(--w-fill);">
        <i data-lucide="search" class="w-4 h-4"></i> 검색
      </button>
    </div>

    <div class="flex items-center gap-2 mt-2 border rounded px-3 py-2 text-xs" style="border-color:var(--w-border); background:var(--w-fill);">
      <i data-lucide="info" class="w-4 h-4 shrink-0"></i>
      주변 5km에 충전소가 없습니다
    </div>

    <div class="w-mapgrid relative w-full mt-4 rounded" style="height:420px; border:1px solid var(--w-border);">
      <div class="flex flex-col items-center" style="top:50%; left:50%;">
        <i data-lucide="map-pin" class="w-6 h-6"></i>
        <span class="w-pin-label mt-0.5">강원도 인제군 진동리</span>
      </div>
    </div>

  </div>
</div>

<script>
function show(id) {
  document.querySelectorAll('.screen').forEach(function(s) { s.classList.remove('active'); });
  document.getElementById('screen-' + id).classList.add('active');
  document.querySelectorAll('nav button[id^="nav-"]').forEach(function(b) { b.classList.remove('active'); });
  document.getElementById('nav-' + id).classList.add('active');
}

function setViewport(mode) {
  document.body.classList.remove('viewport-mobile', 'viewport-desktop');
  document.body.classList.add('viewport-' + mode);
  document.querySelectorAll('.vp-toggle button').forEach(function(b) { b.classList.remove('active'); });
  document.getElementById('vp-' + mode).classList.add('active');
}

document.addEventListener('click', function(e) {
  var target = e.target.closest('[data-goto]');
  if (target) show(target.getAttribute('data-goto').replace('screen-', ''));
});

document.addEventListener('DOMContentLoaded', function() {
  var first = document.querySelector('nav button[id^="nav-"]');
  if (first) first.click();
  lucide.createIcons();
});
</script>
</body>
</html>
